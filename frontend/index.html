<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c0c15" />
    <meta name="description" content="A web app to manage personal finances." />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>Bankerchief</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg:       #0c0c15;
            --surface:  #12121e;
            --border:   rgba(255, 255, 255, 0.07);
            --text:     #ebe9f5;
            --muted:    rgba(235, 233, 245, 0.4);
            --accent:   #818cf8;
            --income:   #4ade80;
            --expense:  #f87171;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-mono:    'DM Mono', 'Courier New', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100svh;
            max-width: 640px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.125rem 1.25rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .brand-gem {
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 4px;
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.0625rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }

        #status {
            font-family: var(--font-mono);
            font-size: 0.5625rem;
            letter-spacing: 0.06em;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            border: 1px solid;
        }

        #status.online  { color: var(--income);  border-color: rgba(74,222,128,0.3);  background: rgba(74,222,128,0.08);  }
        #status.offline { color: var(--expense); border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }

        #refresh-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--muted);
            cursor: pointer;
            width: 2rem;
            height: 2rem;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            transition: color 0.15s, border-color 0.15s;
        }

        #refresh-btn:hover { color: var(--text); border-color: var(--border-2, rgba(255,255,255,0.18)); }
        #refresh-btn:active { transform: scale(0.92); }
        #refresh-btn[aria-busy="true"] svg { animation: spin 0.7s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        main {
            padding: 1.5rem 1.25rem;
        }

        h2 {
            font-family: var(--font-display);
            font-style: italic;
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text);
            margin-bottom: 1.25rem;
        }

        h2 .date-range {
            font-family: var(--font-mono);
            font-style: normal;
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--muted);
            display: block;
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="brand-gem"></div>
        <span class="brand-name">Bankerchief</span>
    </div>
    <div style="display:flex;align-items:center;gap:0.5rem;">
        <button id="refresh-btn" aria-label="Refresh transactions">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13.5 8A5.5 5.5 0 1 1 10 3.07"/>
                <polyline points="10 1 10 4 13 4"/>
            </svg>
        </button>
        <span id="status" class="online">● Online</span>
    </div>
</header>

<main>
    <h2>Transactions<span class="date-range" id="txn-range"></span></h2>
    <transaction-list id="txn-list"></transaction-list>
</main>

<script type="module" src="app.js"></script>

<script>
    // Online/offline badge (plain script, no module needed)
    const statusEl = document.getElementById('status');
    function updateStatus() {
        statusEl.textContent = navigator.onLine ? '● Online' : '● Offline';
        statusEl.className   = navigator.onLine ? 'online' : 'offline';
    }
    window.addEventListener('online',  updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();

    // Service worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .catch(err => console.warn('SW registration failed:', err));
        });
    }
</script>
</body>
</html>
