<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FBF4EC" />
    <meta name="description" content="A simple web app to track your income and expenses." />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>Bankerchief</title>
    <!-- Chart.js (used by home-view component) -->
    <script src="/vendor/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:       #FBF4EC;
            --surface:  #FFFCF7;
            --border:   rgba(58, 48, 38, 0.14);
            --text:     #33302B;
            --muted:    #8A7E6E;
            --accent:   #0F6E78;
            --income:   #3F7350;
            --expense:  #A8453A;
            --font-display: system-ui, -apple-system, sans-serif;
            --font-mono:    ui-monospace, Menlo, Monaco, Consolas, monospace;
        }

        html { font-size: 112.5%; }  /* 16px → 18px */

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100svh;
            max-width: 640px;
            margin: 0 auto;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.125rem 1.25rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        #back-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 0.125rem 0.375rem 0.125rem 0;
            font-size: 1.25rem;
            line-height: 1;
            transition: color 0.15s;
            display: flex;
            align-items: center;
        }
        #back-btn:hover { color: var(--text); }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: inherit;
        }

        .brand-gem {
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 4px;
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.0625rem;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #status {
            font-family: var(--font-mono);
            font-size: 0.5625rem;
            letter-spacing: 0.06em;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            border: 1px solid;
        }
        #status.online  { color: var(--income);  border-color: rgba(63,115,80,0.35);  background: rgba(63,115,80,0.10);  }
        #status.offline { color: var(--expense); border-color: rgba(168,69,58,0.35); background: rgba(168,69,58,0.10); }

        #draft-btn {
            font-family: var(--font-mono);
            font-size: 0.5625rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.3rem 0.65rem;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }
        #draft-btn:hover { color: var(--text); border-color: rgba(58,48,38,0.28); }
        #draft-btn.active {
            color: var(--accent);
            border-color: rgba(15,110,120,0.4);
            background: rgba(15,110,120,0.10);
        }

        /* Leave room for the fixed draft tray so it never hides content. */
        body.draft-active main { padding-bottom: 5rem; }

        #refresh-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--muted);
            cursor: pointer;
            width: 2rem;
            height: 2rem;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            transition: color 0.15s, border-color 0.15s;
        }
        #refresh-btn:hover  { color: var(--text); border-color: rgba(58,48,38,0.28); }
        #refresh-btn:active { transform: scale(0.92); }
        #refresh-btn[aria-busy="true"] svg { animation: spin 0.7s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Main / view root ── */
        main { padding: 1.5rem 1.25rem; }

        /* Heading rendered by app.js for the month view */
        .view-heading {
            font-family: var(--font-display);
            font-style: italic;
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text);
            margin-bottom: 1.25rem;
        }

        /* Initial loading placeholder */
        .loading-placeholder {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 3rem 0;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(58,48,38,0.15);
            border-top-color: rgba(58,48,38,0.5);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button id="back-btn" hidden aria-label="Back to overview">‹</button>
        <a class="brand" href="#">
            <div class="brand-gem"></div>
            <span class="brand-name">Bankerchief</span>
        </a>
    </div>
    <div class="header-right">
        <button id="draft-btn" aria-pressed="false">✎ Draft rules</button>
        <button id="refresh-btn" aria-label="Refresh data">
            <svg width="14" height="14" viewBox="0 0 512 512" fill="currentColor">
                <g transform="translate(64, 64)">
                    <path d="M234.666667,149.333333 L234.666667,106.666667 L314.564847,106.664112 C287.579138,67.9778918 242.745446,42.6666667 192,42.6666667 C109.525477,42.6666667 42.6666667,109.525477 42.6666667,192 C42.6666667,274.474523 109.525477,341.333333 192,341.333333 C268.201293,341.333333 331.072074,284.258623 340.195444,210.526102 L382.537159,215.817985 C370.807686,310.617565 289.973536,384 192,384 C85.961328,384 1.42108547e-14,298.038672 1.42108547e-14,192 C1.42108547e-14,85.961328 85.961328,1.42108547e-14 192,1.42108547e-14 C252.316171,1.42108547e-14 306.136355,27.8126321 341.335366,71.3127128 L341.333333,1.42108547e-14 L384,1.42108547e-14 L384,149.333333 L234.666667,149.333333 Z"/>
                </g>
            </svg>
        </button>
        <span id="status" class="online">● Online</span>
    </div>
</header>

<main>
    <div id="view-root">
        <div class="loading-placeholder">
            <span class="spinner"></span> Loading…
        </div>
    </div>
</main>

<draft-sheet></draft-sheet>

<script type="module" src="app.js"></script>

<script>
    const statusEl = document.getElementById('status');
    function updateStatus() {
        statusEl.textContent = navigator.onLine ? '● Online' : '● Offline';
        statusEl.className   = navigator.onLine ? 'online' : 'offline';
    }
    window.addEventListener('online',  updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .catch(err => console.warn('SW registration failed:', err));
        });
    }
</script>
</body>
</html>
